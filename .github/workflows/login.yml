name: azure

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "env to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  login:
    name: az login
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: "e703ae9f-8bc5-4d01-b6a4-10206132c8f0"
          subscription-id: "0fe2604a-a62d-4f0c-8f57-3f547fa2291a"
          tenant-id: "f3a7f9ec-a9ee-4582-826d-6fdd1b261016"

      - name: Verify Login
        shell: bash
        run: |
          echo "az login successful"
          az account show
          az group list --output table
